<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      background: #f9f9f9;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #0a66c2;
      margin-bottom: 14px;
    }

    /* Method toggle */
    .method-toggle {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .method-toggle label {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      background: white;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }
    .method-toggle input[type="radio"] { display: none; }
    .method-toggle input[type="radio"]:checked + label {
      background: #0a66c2;
      color: white;
    }
    .method-toggle label:first-of-type { border-right: 1px solid #ccc; }

    /* API key section */
    #claudeConfig { margin-bottom: 12px; }
    #claudeConfig label {
      font-size: 12px;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }
    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      background: white;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #0a66c2;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #084fa1; }
    button:disabled { background: #a0b4c8; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
      text-align: center;
      color: #333;
    }
    #status.error   { color: #cc0000; }
    #status.success { color: #067d3e; font-weight: 600; }
    #status.loading { color: #0a66c2; }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Queens Solver</h1>

  <div class="method-toggle">
    <input type="radio" name="method" id="methodLocal" value="local">
    <label for="methodLocal">Local (instantané)</label>
    <input type="radio" name="method" id="methodClaude" value="claude">
    <label for="methodClaude">Claude AI</label>
  </div>

  <div id="claudeConfig" style="display:none">
    <label for="apiKey">Clé API Anthropic</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off" />
    <p class="hint" style="margin-top:4px;margin-bottom:0">Sauvegardée localement dans votre navigateur.</p>
  </div>

  <button id="solveBtn" style="margin-top:12px">Résoudre la grille</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
